<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuroraFairy - 开发者调试窗口</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toolbar h1 {
      font-size: 14px;
      font-weight: 700;
      color: #e94560;
      letter-spacing: 0.02em;
    }

    .log-count {
      font-size: 11px;
      background: #0f3460;
      color: #53a8b6;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }

    .filter-group {
      display: flex;
      gap: 4px;
    }

    .filter-btn {
      padding: 5px 12px;
      border: 1px solid #0f3460;
      border-radius: 6px;
      background: transparent;
      color: #a0a0a0;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      border-color: #e94560;
      color: #e0e0e0;
    }

    .filter-btn.active {
      background: #e94560;
      border-color: #e94560;
      color: white;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-btn {
      padding: 5px 12px;
      border: 1px solid #0f3460;
      border-radius: 6px;
      background: transparent;
      color: #a0a0a0;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .action-btn:hover {
      border-color: #53a8b6;
      color: #e0e0e0;
    }

    .log-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      scroll-behavior: smooth;
    }

    .log-entry {
      margin-bottom: 8px;
      border-radius: 8px;
      border: 1px solid #0f3460;
      overflow: hidden;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .log-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .log-header:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .log-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .log-badge.request {
      background: rgba(33, 150, 243, 0.15);
      color: #64b5f6;
    }

    .log-badge.response {
      background: rgba(76, 175, 80, 0.15);
      color: #81c784;
    }

    .log-badge.error {
      background: rgba(244, 67, 54, 0.15);
      color: #e57373;
    }

    .log-badge.info {
      background: rgba(156, 39, 176, 0.15);
      color: #ba68c8;
    }

    .log-time {
      font-size: 11px;
      color: #666;
      font-family: 'Consolas', 'Monaco', monospace;
      flex-shrink: 0;
    }

    .log-title {
      font-size: 12px;
      font-weight: 600;
      color: #ccc;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .log-meta {
      font-size: 10px;
      color: #888;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .log-body {
      display: none;
      padding: 0 12px 12px;
      border-top: 1px solid #0f3460;
    }

    .log-body.expanded {
      display: block;
    }

    .log-content {
      margin-top: 8px;
      padding: 12px;
      background: #0d1117;
      border-radius: 6px;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.6;
      color: #c9d1d9;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 400px;
      overflow-y: auto;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #555;
      gap: 12px;
    }

    .empty-state svg {
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 14px;
    }

    .empty-state span {
      font-size: 12px;
      color: #444;
    }

    .auto-scroll-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #888;
    }

    .auto-scroll-toggle input {
      accent-color: #e94560;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1a1a2e;
    }

    ::-webkit-scrollbar-thumb {
      background: #0f3460;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #1a3a5c;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-left">
      <h1>&lt;/&gt; Debug Console</h1>
      <span class="log-count" id="logCount">0 条日志</span>
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="request">请求</button>
        <button class="filter-btn" data-filter="response">响应</button>
        <button class="filter-btn" data-filter="error">错误</button>
      </div>
    </div>
    <div class="toolbar-right">
      <label class="auto-scroll-toggle">
        <input type="checkbox" id="autoScroll" checked />
        自动滚动
      </label>
      <button class="action-btn" id="clearBtn">清空日志</button>
    </div>
  </div>

  <div class="log-container" id="logContainer">
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
        <polyline points="16,18 22,12 16,6"></polyline>
        <polyline points="8,6 2,12 8,18"></polyline>
      </svg>
      <p>等待日志...</p>
      <span>在主窗口发送消息后，请求和响应将在此处显示</span>
    </div>
  </div>

  <script type="module" src="/src/debug.ts"></script>
</body>
</html>
